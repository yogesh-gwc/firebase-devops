name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Install dependencies
        run: npm install
        
      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: AIzaSyDnP9Omq5KbnwkHZbxaDIWwIMU9pxbxSs8
          VITE_FIREBASE_AUTH_DOMAIN: sample-project-aee1e.firebaseapp.com
          VITE_FIREBASE_DATABASE_URL: https://sample-project-aee1e-default-rtdb.firebaseio.com
          VITE_FIREBASE_PROJECT_ID: sample-project-aee1e
          VITE_FIREBASE_STORAGE_BUCKET: sample-project-aee1e.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "577574918982"
          VITE_FIREBASE_APP_ID: 1:577574918982:web:8d08f646f7ae6fd7d42347
          VITE_FIREBASE_MEASUREMENT_ID: G-RWGH96TGLR
          
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SAMPLE_PROJECT_AEE1E }}
          projectId: sample-project-aee1e